x-template: &base
  build: .
  volumes:
    - .:/app
  working_dir: /app
  init: true
  network_mode: service:broker
  environment:
    PUB_INTERVAL: 5

services:
  broker:
    image: eclipse-mosquitto:latest

  py:
    <<: *base
    network_mode: bridge
    command: python3 -c "import signal; signal.pause()"

  pymosq_sub:
    <<: *base
    command: python3 -m benchmarks.pymosq_sub

  pymosq_pub:
    <<: *base
    command: python3 -m benchmarks.pymosq_pub

  paho_sub:
    <<: *base
    command: python3 -m benchmarks.paho_sub
