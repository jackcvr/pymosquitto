x-template: &base
  build: .
  volumes:
    - .:/app
  working_dir: /app
  init: true
  network_mode: service:broker

services:
  broker:
    image: eclipse-mosquitto:latest

  py:
    <<: *base
    command: python3 -c "import signal; signal.pause()"

  pymosq_sub:
    <<: *base
    command: python3 -m examples.pymosq_sub
    # command: gdb -ex r --args python3 -m examples.pymosq_sub

  pymosq_pub:
    <<: *base
    command: python3 -m examples.pymosq_pub

  paho_sub:
    <<: *base
    command: python3 -m examples.paho_sub
