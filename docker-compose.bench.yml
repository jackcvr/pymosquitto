x-template: &base
  build: .
  volumes:
    - .:/app
  working_dir: /app
  init: true
  network_mode: service:broker
  depends_on:
    - broker
  environment:
    MQTT_QOS: ${MQTT_QOS}
    MQTT_LIMIT: ${MQTT_LIMIT}
    PUB_INTERVAL: ${PUB_INTERVAL}

services:
  broker:
    image: eclipse-mosquitto:latest
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

  sub:
    <<: *base
    command: /usr/bin/time -v python3 -m benchmarks.${PREFIX}_sub

  pub:
    image: eclipse-mosquitto:latest
    network_mode: service:broker
    init: true
    depends_on:
      - broker
      - sub
    command: sh -c "sleep 1 && mosquitto_pub -t "benchmark" -n --repeat ${MQTT_LIMIT} --repeat-delay ${PUB_INTERVAL} --nodelay"
